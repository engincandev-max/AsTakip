services:
  db:
    image: postgres:15-alpine
    environment:
      - POSTGRES_USER=${DB_USER:-engincan}
      - POSTGRES_PASSWORD=${DB_PASSWORD:-astakip123}
      - POSTGRES_DB=${DB_NAME:-enverer_db}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    environment:
      - DB_HOST=db
      - DB_PORT=5432
      - DB_USER=${DB_USER:-engincan}
      - DB_PASSWORD=${DB_PASSWORD:-astakip123}
      - DB_NAME=${DB_NAME:-enverer_db}
      - PORT=3000
    depends_on:
      - db
    volumes:
      - ./backend/uploads:/app/uploads
    restart: always

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_GOOGLE_MAPS_API_KEY=${VITE_GOOGLE_MAPS_API_KEY}
    ports:
      - "8080:80"
    restart: always

volumes:
  postgres_data:
